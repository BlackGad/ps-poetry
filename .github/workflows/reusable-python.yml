name: Reusable - Python

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
        description: 'Working directory'
      publish:
        required: false
        type: boolean
        default: false
        description: 'Whether to build and publish packages to PyPI'
    secrets:
      PYPI_PAT:
        required: false
        description: 'PyPI token for publishing (required when publish is true)'

env:
  PYTHON_VERSION: "3.13"

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "2.3.1"
      LOCK_PATH: ${{ format('{0}/poetry.lock', inputs.working_directory) }}
      PROJECT_PATH: ${{ format('{0}/pyproject.toml', inputs.working_directory) }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        id: setup_python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup pipx custom paths
        id: pipx-env
        shell: bash
        run: |
          PIPX_CACHE="${{ github.workspace }}/pipx_cache"
          echo "cache_path=${PIPX_CACHE}" >> $GITHUB_OUTPUT
          echo "PIPX_HOME=${PIPX_CACHE}/home" >> $GITHUB_ENV
          echo "PIPX_BIN_DIR=${PIPX_CACHE}/bin" >> $GITHUB_ENV
          echo "${PIPX_CACHE}/bin" >> $GITHUB_PATH

      - name: Cache pipx Poetry install
        id: cache-pipx
        uses: actions/cache@v4
        with:
          path: ${{ steps.pipx-env.outputs.cache_path }}
          key: pipx-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-poetry-${{ env.POETRY_VERSION }}

      - name: Install Poetry via pipx
        if: steps.cache-pipx.outputs.cache-hit != 'true'
        run: pipx install poetry==${{ env.POETRY_VERSION }} --python "${{ steps.setup_python.outputs.python-path }}"

      - name: Ensure Poetry is available
        run: poetry --version

      - name: Cache Poetry dependencies & venv
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.working_directory }}/.venv
            ${{ inputs.working_directory }}/.poetry
            ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-py${{ steps.setup_python.outputs.python-version }}-${{ hashFiles(env.LOCK_PATH, env.PROJECT_PATH) }}

      - name: Setup environment
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ${{ inputs.working_directory }}
        run: poetry sync

      - name: Activate virtual environment
        shell: bash
        run: |
          echo "${{ inputs.working_directory }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/${{ inputs.working_directory }}/.venv" >> $GITHUB_ENV

      - name: Test packages
        working-directory: ${{ inputs.working_directory }}
        run: poetry check

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: '${{ inputs.working_directory }}/report.xml'
          reporter: java-junit

      - name: Build and publish packages
        if: ${{ inputs.publish }}
        working-directory: ${{ inputs.working_directory }}
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_PAT }}
        run: |
          poetry build
          poetry publish --skip-existing
